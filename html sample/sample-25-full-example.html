<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>HTML 예제 25 - 최소 세트</title>
</head>
<body>
  <h1>캐릭터 이름</h1>

  <p>
    이 캐릭터는 <strong>용감한 모험가</strong>입니다.<br>
    <em>숲</em>과 <em>산</em>을 여행하는 것을 좋아해요.
  </p>

  <hr>

  <h2>특징</h2>
  <ul>
    <li>공격력이 높아요.</li>
    <li>체력이 튼튼해요.</li>
    <li><mark>동료를 잘 챙기는 성격</mark>이에요.</li>
  </ul>

  <h2>이미지</h2>
  <img src="character.png" alt="숲을 배경으로 서 있는 캐릭터 이미지" />

  <h2>한 마디</h2>
  <blockquote>
    “오늘도 새로운 모험을 떠나볼까요?”
  </blockquote>
</body>
</html>
